<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hub de Formação — Oblatos</title>
  <style>
    :root {
      --bg: #0a0600;
      --bg2: #150e03;
      --gold: #b8860b;
      --goldl: #d4a017;
      --red: #7a1515;
      --red2: #5c0e0e;
      --parch: #f4ecce;
      --ink: #2c1a0e;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at center, var(--bg2) 0%, var(--bg) 100%);
      color: var(--parch);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      line-height: 1.6;
    }

    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 800px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2rem;
      color: var(--goldl);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--gold);
      font-style: italic;
    }

    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      width: 100%;
    }

    .episode-card {
      background: linear-gradient(145deg, rgba(21, 14, 3, 0.9), rgba(10, 6, 0, 0.95));
      border: 1px solid rgba(184, 134, 11, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .episode-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .episode-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 0 15px rgba(184,134,11,0.2);
      border-color: rgba(184, 134, 11, 0.6);
    }

    .episode-card:hover::before {
      opacity: 1;
    }

    .ep-cover {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      margin-bottom: 1rem;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .ep-title {
      font-size: 1.3rem;
      color: var(--goldl);
      margin-bottom: 0.5rem;
    }

    .ep-date {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    .play-btn-small {
      min-height: 48px;
      background: linear-gradient(145deg, var(--red2), var(--red));
      color: var(--parch);
      border: 1px solid var(--gold);
      padding: 0.6rem 1.5rem;
      border-radius: 20px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .episode-card:hover .play-btn-small {
      min-height: 48px;
      background: linear-gradient(145deg, var(--red), #8f1919);
      box-shadow: 0 0 10px rgba(122,21,21,0.5);
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(244, 236, 206, 0.4);
      padding-bottom: 2rem;
    }

  </style>
</head>

  <!-- Modal de Identificação -->
  <div class="modal-overlay" id="identifyModal">
    <div class="modal-content">
      <h3 class="modal-title">Bem-vindo(a)</h3>
      <p class="modal-desc">Por favor, insira seu nome para iniciarmos a formação.</p>
      <input type="text" id="listenerName" class="name-input" placeholder="Seu nome completo" autocomplete="name">
      <button class="btn-submit" id="btnContinue">Continuar</button>
    </div>
  </div>

  <script>
    // Canvas Background
    (function() {
      var canvas = document.getElementById('bg');
      var ctx = canvas.getContext('2d');
      var W, H;
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);
      var numPts = window.innerWidth < 480 ? 30 : 60;
      var pts = Array.from({length: numPts}, function() {
        return {
          x: Math.random()*W, y: Math.random()*H,
          r: Math.random()*1.8+0.4, vx: (Math.random()-.5)*.28,
          vy: -(Math.random()*.4+.08), a: Math.random()*.4+.07
        };
      });
      function tick() {
        ctx.clearRect(0,0,W,H);
        for (var i = 0; i < pts.length; i++) {
          var p = pts[i];
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle = 'rgba(184,134,11,' + p.a + ')';
          ctx.fill();
          p.x += p.vx; p.y += p.vy;
          if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
          if (p.x < -5) p.x = W + 5;
          if (p.x > W+5) p.x = -5;
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();

    // Lógica de Navegação
    const cards = document.querySelectorAll('.episode-card');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        window.location.href = card.getAttribute('data-url');
      });
    });

  </script>
